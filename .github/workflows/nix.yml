name: Build dix with Nix

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Nix Package (${{ matrix.system }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 50
    strategy:
      fail-fast: false
      matrix:
        system:
          - x86_64-linux
          - aarch64-linux
          - aarch64-darwin
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
          - system: aarch64-darwin
            runner: macos-15

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore cached paths
        id: cache-store-restore
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ matrix.system }}-${{ hashFiles('flake.nix', 'flake.lock', 'Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml') }}
          restore-prefixes-first-match: nix-${{ matrix.system }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ matrix.system }}-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never

      - name: Build dix
        run: nix build .#packages.${{ matrix.system }}.dix -L --no-link
